name: Backend CI

on:
  push:
    paths:
      - "kinderbackend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "kinderbackend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: kinderbackend
    env:
      SECRET_KEY: TEST_ONLY_SECRET
      KINDER_JWT_SECRET: TEST_ONLY_SECRET
      ENABLE_ADMIN_SEED_ENDPOINT: "true"
      ADMIN_SEED_SECRET: TEST_ONLY_SECRET
      ADMIN_SEED_PASSWORD: CHANGE_ME
      ADMIN_SEED_EMAIL: change-me@example.invalid
      ADMIN_SEED_NAME: DEV ONLY ADMIN
      SKIP_SCHEMA_VERIFY: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            kinderbackend/requirements.txt
            kinderbackend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Black formatting check
        run: black --check .

      - name: isort import order check
        run: isort --check-only .

      - name: Targeted mypy check
        run: mypy

      - name: Import smoke test
        run: python -m pytest test_imports.py -q

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-checks
    defaults:
      run:
        shell: bash
        working-directory: kinderbackend
    env:
      SECRET_KEY: TEST_ONLY_SECRET
      KINDER_JWT_SECRET: TEST_ONLY_SECRET
      ENABLE_ADMIN_SEED_ENDPOINT: "true"
      ADMIN_SEED_SECRET: TEST_ONLY_SECRET
      ADMIN_SEED_PASSWORD: CHANGE_ME
      ADMIN_SEED_EMAIL: change-me@example.invalid
      ADMIN_SEED_NAME: DEV ONLY ADMIN
      SKIP_SCHEMA_VERIFY: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            kinderbackend/requirements.txt
            kinderbackend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest suite with coverage
        run: |
          python -m pytest -q \
            --cov=. \
            --cov-fail-under=70 \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov

      - name: Enforce backend coverage policy
        run: |
          python ../tools/coverage_policy.py backend \
            --coverage-file coverage.xml \
            --min-total 70 \
            --summary-file "$GITHUB_STEP_SUMMARY"

      - name: Upload backend coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: |
            kinderbackend/coverage.xml
            kinderbackend/htmlcov
          if-no-files-found: error
