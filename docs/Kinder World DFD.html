document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

>\n          <text x=\"1755\" y=\"148\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"900\" fill=\"#1d2433\">OpenAI<\u002Ftext>\n          <text x=\"1755\" y=\"166\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"700\" fill=\"#6a40c0\">AI + moderation<\u002Ftext>\n\n          <rect x=\"1670\" y=\"300\" width=\"170\" height=\"60\" rx=\"9\" fill=\"#fdf0e0\" stroke=\"#e0892b\" stroke-width=\"2\"><\u002Frect>\n          <text x=\"1755\" y=\"328\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"900\" fill=\"#1d2433\">Stripe<\u002Ftext>\n          <text x=\"1755\" y=\"346\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"700\" fill=\"#b06f1f\">payments + webhooks<\u002Ftext>\n\n          <rect x=\"1670\" y=\"610\" width=\"170\" height=\"60\" rx=\"9\" fill=\"#eef1f6\" stroke=\"#5b6678\" stroke-width=\"2\"><\u002Frect>\n          <text x=\"1755\" y=\"638\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"900\" fill=\"#1d2433\">Firebase Hosting<\u002Ftext>\n          <text x=\"1755\" y=\"656\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"700\" fill=\"#5b6678\">web app hosting<\u002Ftext>\n\n          <rect x=\"1670\" y=\"840\" width=\"170\" height=\"60\" rx=\"9\" fill=\"#e3f6f6\" stroke=\"#159a9a\" stroke-width=\"2\"><\u002Frect>\n          <text x=\"1755\" y=\"868\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"900\" fill=\"#1d2433\">Email Service<\u002Ftext>\n          <text x=\"1755\" y=\"886\" text-anchor=\"middle\" font-size=\"9.5\" font-weight=\"700\" fill=\"#0f7d7d\">Brevo / SMTP<\u002Ftext>\n        <\u002Fg>\n      <\u002Fsvg>\n    <\u002Fdiv>\n\n    <!-- ============ REFERENCE TABLES ============ -->\n    <sc-if value=\"{{ showReferenceTables }}\" hint-placeholder-val=\"{{ true }}\">\n    <div class=\"dfd-card\" style=\"background:#fff;border:1px solid #e7ecf5;border-radius:18px;padding:24px;margin-bottom:26px;box-shadow:0 16px 36px rgba(30,40,80,.06)\">\n      <h2 style=\"font-size:18px;font-weight:900;margin-bottom:3px\">Process Reference<\u002Fh2>\n      <p style=\"font-size:13px;font-weight:700;color:#5b6678;margin-bottom:16px\">Inputs, outputs and data-store access for each Level-1 process<\u002Fp>\n      <div style=\"overflow-x:auto\">\n      <table style=\"width:100%;border-collapse:collapse;font-size:12.5px\">\n        <thead>\n          <tr>\n            <th style=\"text-align:left;padding:9px 10px;border-bottom:2px solid #e7ecf5;font-size:11px;font-weight:800;color:#8b95a7;letter-spacing:.4px;white-space:nowrap\">PROCESS<\u002Fth>\n            <th style=\"text-align:left;padding:9px 10px;border-bottom:2px solid #e7ecf5;font-size:11px;font-weight:800;color:#8b95a7;letter-spacing:.4px\">INPUT FLOWS<\u002Fth>\n            <th style=\"text-align:left;padding:9px 10px;border-bottom:2px solid #e7ecf5;font-size:11px;font-weight:800;color:#8b95a7;letter-spacing:.4px\">OUTPUT FLOWS<\u002Fth>\n            <th style=\"text-align:left;padding:9px 10px;border-bottom:2px solid #e7ecf5;font-size:11px;font-weight:800;color:#8b95a7;letter-spacing:.4px;white-space:nowrap\">STORES<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <sc-for list=\"{{ processes }}\" as=\"p\" hint-placeholder-count=\"8\"><tr style=\"vertical-align:top\">\n              <td style=\"padding:11px 10px;border-bottom:1px solid #eef1f6;white-space:nowrap\">\n                <span style=\"display:inline-block;font-size:11px;font-weight:900;color:#fff;padding:2px 8px;border-radius:5px;margin-bottom:4px;background:{{ p.color }}\">{{ p.num }}<\u002Fspan>\n                <div style=\"font-weight:900;color:#1d2433;font-size:12.5px\">{{ p.name }}<\u002Fdiv>\n              <\u002Ftd>\n              <td style=\"padding:11px 10px;border-bottom:1px solid #eef1f6;color:#3a4150;font-weight:700\">{{ p.inp }}<\u002Ftd>\n              <td style=\"padding:11px 10px;border-bottom:1px solid #eef1f6;color:#3a4150;font-weight:700\">{{ p.out }}<\u002Ftd>\n              <td style=\"padding:11px 10px;border-bottom:1px solid #eef1f6;color:#5b6678;font-weight:800;white-space:nowrap\">{{ p.stores }}<\u002Ftd>\n            <\u002Ftr><\u002Fsc-for>\n        <\u002Ftbody>\n      <\u002Ftable>\n      <\u002Fdiv>\n\n      <h2 style=\"font-size:18px;font-weight:900;margin:26px 0 3px\">Data Stores<\u002Fh2>\n      <p style=\"font-size:13px;font-weight:700;color:#5b6678;margin-bottom:16px\">D1–D10, drawn in open-ended (Yourdon/DeMarco) notation above<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:10px 22px\">\n        <sc-for list=\"{{ stores }}\" as=\"d\" hint-placeholder-count=\"10\">\n          <div style=\"display:flex;gap:11px;align-items:flex-start;padding:9px 0;border-bottom:1px solid #f1f4f9\">\n            <span style=\"flex:0 0 auto;font-size:11px;font-weight:900;color:#fff;padding:3px 8px;border-radius:5px;min-width:38px;text-align:center;background:{{ d.color }}\">{{ d.id }}<\u002Fspan>\n            <div>\n              <div style=\"font-weight:900;font-size:13px;color:#1d2433\">{{ d.name }}<\u002Fdiv>\n              <div style=\"font-weight:700;font-size:11.5px;color:#5b6678\">{{ d.desc }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    \n    <footer style=\"text-align:center;color:#8b95a7;font-size:12.5px;font-weight:700;margin-top:24px\">\n      Kinder World · Graduation Project — System Design / Data Flow Diagram &nbsp;·&nbsp; Yourdon–DeMarco notation\n    <\u002Ffooter>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:920},&quot;showNotationGuide&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Sections&quot;},&quot;showReferenceTables&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Sections&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      showNotationGuide: this.props.showNotationGuide ?? true,\n      showReferenceTables: this.props.showReferenceTables ?? true,\n      processes: [\n        { num: '1.0', name: 'Authentication & Account Mgmt', color: '#2f6fb0',\n          inp: 'Parent register / login / OTP verify / 2FA · Child PIN (picture or numeric) · Admin login (admin_auth)',\n          out: 'JWT session token · OTP email request (→ P7) · authentication result',\n          stores: 'D1, D2' },\n        { num: '2.0', name: 'Child Profile Management', color: '#2f6fb0',\n          inp: 'Create / edit child (name, age, avatar, PIN) · parental controls: screen-time, content filters, allowed axes, schedule rules, blocked apps/sites',\n          out: 'Saved child profile · applied control settings',\n          stores: 'D2' },\n        { num: '3.0', name: 'Content & Learning Engine', color: '#1f9d63',\n          inp: 'Content request by category / axis · activity & quiz completion · subscription status (premium gate)',\n          out: 'Lessons / quizzes / media · progress sync (Hive ↔ backend) · free vs. premium gating decision',\n          stores: 'D3, D4' },\n        { num: '4.0', name: 'Analytics & Reporting', color: '#4f5bd5',\n          inp: 'Real-time analytics events & sessions · mood entries (from child mode)',\n          out: 'Aggregated XP, level, streak, time_spent, activities_completed · daily / weekly & child-development reports',\n          stores: 'D5, D9' },\n        { num: '5.0', name: 'AI Buddy', color: '#7c4ddb',\n          inp: 'Child message',\n          out: 'Moderation request & prompt (→ OpenAI) · age-appropriate response · stored interaction',\n          stores: 'D7' },\n        { num: '6.0', name: 'Subscription & Payment', color: '#e0892b',\n          inp: 'Plan selection (monthly / yearly) · Stripe checkout · payment webhook',\n          out: 'Subscription status (→ P3 gate) · payment method (last4, brand, expires_at) · billing records',\n          stores: 'D6' },\n        { num: '7.0', name: 'Notifications', color: '#159a9a',\n          inp: 'Triggers: subscription expiry, new content, streak alerts (incl. from P6)',\n          out: 'In-app notifications (stored) + email via Brevo / SMTP — no Firebase / FCM push',\n          stores: 'D8' },\n        { num: '8.0', name: 'Admin Panel', color: '#d24f4d',\n          inp: 'Admin actions: manage users, children, content (CMS), subscriptions, support tickets',\n          out: 'CMS updates · cached analytics dashboard · audit-log entries · RBAC (superadmin / support_agent)',\n          stores: 'D10 + reads/writes D1–D9' }\n      ],\n      stores: [\n        { id: 'D1', color: '#2f6fb0', name: 'Users DB', desc: 'Parents + admins — credentials, roles' },\n        { id: 'D2', color: '#2f6fb0', name: 'Child Profiles DB', desc: 'Profiles + parental-control settings' },\n        { id: 'D3', color: '#1f9d63', name: 'Content DB', desc: 'Axes / categories, contents, quizzes, media' },\n        { id: 'D4', color: '#1f9d63', name: 'Progress Records DB', desc: 'Local Hive + backend sync: lesson_progress, activity_sessions' },\n        { id: 'D5', color: '#4f5bd5', name: 'Analytics DB', desc: 'Events, sessions, mood entries, daily summaries, aggregated stats' },\n        { id: 'D6', color: '#e0892b', name: 'Subscriptions DB', desc: 'Plans, history, billing transactions, payment_methods' },\n        { id: 'D7', color: '#7c4ddb', name: 'AI Buddy History DB', desc: 'Interactions, sessions, messages' },\n        { id: 'D8', color: '#159a9a', name: 'Notifications DB', desc: 'In-app notification records' },\n        { id: 'D9', color: '#4f5bd5', name: 'Redis Cache', desc: 'report_cache + admin analytics cache' },\n        { id: 'D10', color: '#d24f4d', name: 'Audit Logs DB', desc: 'Audit trail for every sensitive action' }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
