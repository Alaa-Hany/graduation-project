<!DOCTYPE html><html><head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Kinder World">
  <link rel="apple-touch-icon" href="icons/kinderworld-logo.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/kinderworld-logo.png">

  <style>
    /* Keep Flutter Web from fetching fallback fonts over the network. */
    @font-face {
      font-family: 'Roboto';
      src: local('Segoe UI'), local('Arial');
      font-display: swap;
    }

    @font-face {
      font-family: 'Noto Sans Arabic';
      src: local('Segoe UI'), local('Tahoma'), local('Arial');
      font-display: swap;
    }

    @font-face {
      font-family: 'Noto Color Emoji';
      src: local('Segoe UI Emoji'), local('Segoe UI Symbol');
      font-display: swap;
    }
  </style>

  <title>Kinder World</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // The web app is built with `--pwa-strategy=none`, so no service worker is
    // registered. Older builds DID register one, and a stale service worker in a
    // returning visitor's browser keeps serving its cached old bundle/assets even
    // after a new deploy — which shows up as old UI, broken Arabic, and mojibake
    // content from old caches. Whenever this fresh page loads, remove any leftover
    // service worker and drop its caches so the visitor always gets the latest
    // deployed build going forward.
    (function () {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (reg) { reg.unregister(); });
        });
      }
      if (window.caches && caches.keys) {
        caches.keys().then(function (keys) {
          keys.forEach(function (k) { caches.delete(k); });
        });
      }
    })();
  </script>
  <style>
    /* No native web splash: the blue logo page used to linger until the Flutter
       engine rendered its first frame, which felt slow. We now show a neutral
       white background during engine load and let the in-app Flutter splash
       (SplashScreen widget) be the only branded splash. */
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #FFFFFF;
    }
  </style>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
</head>
<body>
  <script src="flutter_bootstrap.js" async=""></script>


</body></html>
