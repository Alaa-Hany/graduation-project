name: kinder_world
version: 1.0.0+1
publish_to: 'none'
description: An intelligent and interactive mobile application for primary school children

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Routing
  go_router: ^13.0.1
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  
  # Network
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  file_picker: ^8.1.2
  crypto: ^3.0.3
  
  # UI & Animation
  flutter_svg: ^2.0.9
  xml: ^6.5.0
  path_drawing: ^1.0.1
  cached_network_image: ^3.4.0
  smooth_page_indicator: ^1.1.0
  
  # Charts
  fl_chart: ^0.65.0
  
  # Device Info
  package_info_plus: ^8.1.3
  
  # Logging & Crash Reporting
  logger: ^2.0.2+1
  
  # Utilities
  uuid: ^4.2.2
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.1
  audioplayers: ^6.1.0
  flutter_tts: ^4.0.2
  speech_to_text: ^7.0.0
  video_player: ^2.9.2
  web: ^1.1.0

  # JSON Serialization
  json_annotation: ^4.8.0
  freezed_annotation: ^2.4.1
  app_settings: ^7.0.0
  android_intent_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.8
  
  # Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.6

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/puzzle_shuffle/
    - assets/images/picture_puzzle/
    - assets/images/memory_match/
    - assets/images/memory_match/cards/
    - assets/images/coloring/
    - assets/images/avatars/
    - assets/icons/
    - assets/animations/
    - assets/sounds/
    - assets/sounds/games/
    # TODO: add real video files before release
    # - assets/videos/

  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Regular.ttf
        - asset: fonts/Poppins-Bold.ttf
          weight: 700
        - asset: fonts/Poppins-Medium.ttf
          weight: 500
    - family: Cairo
      fonts:
        - asset: fonts/Cairo-Regular.ttf
        - asset: fonts/Cairo-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#4A86E8"
  image: assets/icons/kinderworld-logo.png
  android: true
  ios: true
  # Web uses the in-app Flutter SplashScreen widget only — no native web splash
  # (the blue logo page lingered until the engine's first frame, which felt slow).
  web: false

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/kinderworld-logo.png"





