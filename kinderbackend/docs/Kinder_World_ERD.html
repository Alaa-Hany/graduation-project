  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Kinder World — Database Schema (ERD)<\u002Ftitle>\n<style>\n  :root {\n    --paper: #F3F0E8;\n    --paper-2: #ECE8DD;\n    --ink: #2A2622;\n    --ink-soft: #6B6358;\n    --line: #D7D0C2;\n    --line-soft: #E7E1D4;\n    --card: #FCFBF7;\n    --rust: #CC785C;\n    --connector: #BDB3A1;\n  }\n  * { box-sizing: border-box; }\n  html, body { margin: 0; height: 100%; overflow: hidden; }\n  body {\n    font-family: ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", sans-serif;\n    color: var(--ink);\n    background: var(--paper);\n    -webkit-font-smoothing: antialiased;\n  }\n  .serif { font-family: Georgia, \"Times New Roman\", \"Tiempos\", serif; }\n\n  /* ---------- Top bar ---------- */\n  #topbar {\n    position: fixed; inset: 0 0 auto 0; height: 64px; z-index: 40;\n    display: flex; align-items: center; gap: 18px; padding: 0 20px;\n    background: rgba(243,240,232,.86);\n    backdrop-filter: blur(10px);\n    border-bottom: 1px solid var(--line);\n  }\n  #brand { display: flex; flex-direction: column; line-height: 1.15; }\n  #brand .t { font-size: 17px; font-weight: 600; letter-spacing: -.01em; }\n  #brand .s { font-size: 11.5px; color: var(--ink-soft); letter-spacing: .02em; }\n  .spacer { flex: 1; }\n\n  .seg { display: inline-flex; background: var(--paper-2); border: 1px solid var(--line);\n         border-radius: 9px; padding: 2px; }\n  .seg button { border: 0; background: transparent; font: inherit; font-size: 12.5px;\n         padding: 5px 12px; border-radius: 7px; cursor: pointer; color: var(--ink-soft); }\n  .seg button.on { background: var(--card); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.06); font-weight: 550; }\n\n  .iconbtn { border: 1px solid var(--line); background: var(--card); color: var(--ink);\n         width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 16px;\n         display: inline-flex; align-items: center; justify-content: center; }\n  .iconbtn:hover { background: var(--paper-2); }\n  #search {\n    border: 1px solid var(--line); background: var(--card); border-radius: 8px;\n    padding: 7px 12px; font: inherit; font-size: 13px; width: 190px; color: var(--ink);\n  }\n  #search::placeholder { color: #A9A091; }\n\n  /* ---------- Canvas ---------- */\n  #stage { position: fixed; inset: 64px 0 0 0; overflow: hidden; cursor: grab;\n    background-image: radial-gradient(var(--line-soft) 1.1px, transparent 1.1px);\n    background-size: 26px 26px; }\n  #stage.grabbing { cursor: grabbing; }\n  #viewport { position: absolute; top: 0; left: 0; transform-origin: 0 0; }\n  #wires { position: absolute; top: 0; left: 0; overflow: visible; pointer-events: none; }\n\n  /* ---------- Table card ---------- */\n  .tbl {\n    position: absolute; width: 232px; background: var(--card);\n    border: 1px solid var(--line); border-radius: 11px;\n    box-shadow: 0 1px 2px rgba(60,50,35,.05), 0 8px 22px -14px rgba(60,50,35,.30);\n    overflow: hidden; font-size: 12px;\n  }\n  .tbl .hd {\n    display: flex; align-items: center; gap: 8px; padding: 8px 11px;\n    border-bottom: 1px solid var(--line-soft);\n    border-left: 3px solid var(--dc);\n    background: var(--hd);\n  }\n  .tbl .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dc); flex: none; }\n  .tbl .nm { font-weight: 650; font-size: 12.5px; letter-spacing: -.005em; color: var(--ink);\n    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }\n  .tbl .cnt { margin-left: auto; font-size: 10px; color: var(--ink-soft);\n    background: var(--paper-2); border-radius: 20px; padding: 1px 7px; flex: none; }\n\n  .row { display: flex; align-items: center; gap: 6px; padding: 3px 11px 3px 10px;\n    border-top: 1px solid #F2EEE4; }\n  .row:first-child { border-top: 0; }\n  .row .key { width: 14px; flex: none; text-align: center; font-size: 9.5px; font-weight: 700; }\n  .row .cn { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;\n    font-variant-ligatures: none; }\n  .row .ty { color: #9A9182; font-size: 10.5px; font-family: ui-monospace, \"SF Mono\", Menlo, monospace; flex: none; }\n  .row.pk { background: #FBF4E8; }\n  .row.pk .cn { font-weight: 650; }\n  .row.pk .key { color: #C2912F; }\n  .row.fk .key { color: var(--rust); }\n  .row.fk .cn { color: #B5613F; }\n  .badge { font-size: 8.5px; font-weight: 700; letter-spacing: .04em; padding: 0 4px;\n    border-radius: 4px; flex: none; }\n  .badge.u { background: #E7EEF6; color: #4A7BA6; }\n  .badge.enc { background: #EFEAF4; color: #7C6F9F; }\n\n  /* compact mode hides non-key rows */\n  #viewport.compact .row:not(.keep) { display: none; }\n  #viewport.compact .tbl .more { display: flex; }\n  .tbl .more { display: none; padding: 3px 11px; font-size: 10px; color: var(--ink-soft);\n    border-top: 1px solid #F2EEE4; background: #FBFAF6; }\n\n  /* ---------- Wires ---------- */\n  .wire { fill: none; stroke: var(--connector); stroke-width: 1.4; }\n  .wire.one-one { stroke-dasharray: none; }\n  .marker { fill: none; stroke: var(--connector); stroke-width: 1.4; }\n\n  /* ---------- Focus / dim ---------- */\n  #viewport.focusing .tbl { opacity: .26; transition: opacity .14s; }\n  #viewport.focusing .tbl.lit { opacity: 1; }\n  #viewport.focusing .tbl.root { opacity: 1; }\n  .tbl.root { box-shadow: 0 0 0 2px var(--dc), 0 10px 26px -12px rgba(60,50,35,.4); }\n  #wires.focusing .wire, #wires.focusing .marker { stroke: #DAD2C4; opacity: .35; }\n  #wires.focusing .wire.lit, #wires.focusing .marker.lit { opacity: 1; stroke-width: 2; }\n  .dimmed { opacity: .12 !important; }\n\n  /* ---------- Legend ---------- */\n  #legend {\n    position: fixed; left: 16px; bottom: 16px; z-index: 30;\n    background: rgba(252,251,247,.94); backdrop-filter: blur(8px);\n    border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px;\n    box-shadow: 0 10px 30px -16px rgba(60,50,35,.4); max-width: 230px;\n  }\n  #legend .lt { font-size: 10.5px; text-transform: uppercase; letter-spacing: .09em;\n    color: var(--ink-soft); margin-bottom: 8px; font-weight: 650; }\n  .leg { display: flex; align-items: center; gap: 8px; padding: 3px 0; cursor: pointer;\n    font-size: 12px; user-select: none; }\n  .leg .sw { width: 11px; height: 11px; border-radius: 3px; flex: none; }\n  .leg.off { opacity: .38; }\n  .leg .lc { margin-left: auto; font-size: 10px; color: var(--ink-soft); }\n\n  /* ---------- Zoom controls ---------- */\n  #zoom { position: fixed; right: 16px; bottom: 16px; z-index: 30; display: flex; gap: 6px;\n    background: rgba(252,251,247,.94); backdrop-filter: blur(8px);\n    border: 1px solid var(--line); border-radius: 10px; padding: 5px; align-items: center;\n    box-shadow: 0 10px 30px -16px rgba(60,50,35,.4); }\n  #zoom .zl { font-size: 11.5px; color: var(--ink-soft); width: 42px; text-align: center; }\n\n  /* ---------- Hint / key chip ---------- */\n  #hint { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%); z-index: 25;\n    font-size: 11.5px; color: var(--ink-soft); background: rgba(252,251,247,.9);\n    border: 1px solid var(--line); border-radius: 20px; padding: 6px 14px; pointer-events: none; }\n  .kchip { display: inline-block; background: var(--paper-2); border: 1px solid var(--line);\n    border-radius: 5px; padding: 0 5px; font-size: 10.5px; margin: 0 1px; }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n  <div id=\"topbar\">\n    <div id=\"brand\">\n      <span class=\"t serif\">Kinder&nbsp;World<\u002Fspan>\n      <span class=\"s\">Database Schema · ER Diagram<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"seg\" id=\"density\">\n      <button data-d=\"compact\" class=\"on\">Keys<\u002Fbutton>\n      <button data-d=\"full\">All columns<\u002Fbutton>\n    <\u002Fdiv>\n    <input id=\"search\" placeholder=\"Search tables / columns…\" autocomplete=\"off\">\n    <div class=\"spacer\"><\u002Fdiv>\n    <button class=\"iconbtn\" id=\"fitBtn\" title=\"Fit to screen\">⤢<\u002Fbutton>\n    <button class=\"iconbtn\" id=\"resetBtn\" title=\"Reset view\">↺<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div id=\"stage\">\n    <div id=\"viewport\" class=\"compact\">\n      <svg id=\"wires\"><\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"legend\">\n    <div class=\"lt\">Domains <span id=\"domclear\" style=\"float:right;cursor:pointer;text-transform:none;letter-spacing:0;color:#CC785C\">reset<\u002Fspan><\u002Fdiv>\n    <div id=\"legrows\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"zoom\">\n    <button class=\"iconbtn\" id=\"zout\">–<\u002Fbutton>\n    <span class=\"zl\" id=\"zlabel\">100%<\u002Fspan>\n    <button class=\"iconbtn\" id=\"zin\">+<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div id=\"hint\">Drag to pan · Scroll to zoom · Hover a table to trace its relationships<\u002Fdiv>\n\n  <script src=\"f1858d3e-8bde-4d8d-886d-047f3e53ce3d\"><\u002Fscript>\n  <script>\n  (function(){\n    const DOMAINS = window.ERD_DOMAINS, TABLES = window.ERD_TABLES;\n    const vp = document.getElementById('viewport');\n    const svg = document.getElementById('wires');\n    const stage = document.getElementById('stage');\n    const NS = 'http://www.w3.org/2000/svg';\n    const HEADER_H = 37, ROW_H = 22.4;\n\n    const byName = {};\n    TABLES.forEach(t => byName[t.name] = t);\n\n    // ----- build relationships from FK columns -----\n    const rels = [];\n    TABLES.forEach(t => {\n      t.cols.forEach((c, i) => {\n        const fk = (c[2]||'').split(/\\s+/).find(f => f.startsWith('F:'));\n        if (fk) {\n          const target = fk.slice(2).split('.')[0];\n          if (byName[target]) {\n            const oneToOne = /\\bU\\b/.test(c[2]||'');\n            rels.push({ from: target, to: t.name, col: c[0], colIdx: i, oneToOne });\n          }\n        }\n      });\n    });\n\n    // adjacency for focus highlighting\n    const adj = {};\n    TABLES.forEach(t => adj[t.name] = new Set());\n    rels.forEach(r => { adj[r.from].add(r.to); adj[r.to].add(r.from); });\n\n    // ----- render legend -----\n    const activeDomains = new Set(Object.keys(DOMAINS));\n    const domCount = {};\n    TABLES.forEach(t => domCount[t.domain] = (domCount[t.domain]||0)+1);\n    const legrows = document.getElementById('legrows');\n    Object.entries(DOMAINS).forEach(([k, d]) => {\n      const el = document.createElement('div');\n      el.className = 'leg'; el.dataset.k = k;\n      el.innerHTML = `<span class=\"sw\" style=\"background:${d.color}\"><\u002Fspan><span>${d.label}<\u002Fspan><span class=\"lc\">${domCount[k]||0}<\u002Fspan>`;\n      el.onclick = () => { el.classList.toggle('off');\n        if (el.classList.contains('off')) activeDomains.delete(k); else activeDomains.add(k);\n        applyDomainFilter(); };\n      legrows.appendChild(el);\n    });\n    document.getElementById('domclear').onclick = () => {\n      activeDomains.clear(); Object.keys(DOMAINS).forEach(k=>activeDomains.add(k));\n      document.querySelectorAll('.leg').forEach(e=>e.classList.remove('off'));\n      applyDomainFilter();\n    };\n\n    // ----- render tables -----\n    const elFor = {};\n    TABLES.forEach(t => {\n      const d = DOMAINS[t.domain];\n      const el = document.createElement('div');\n      el.className = 'tbl'; el.dataset.name = t.name;\n      el.style.left = t.x + 'px'; el.style.top = t.y + 'px';\n      el.style.setProperty('--dc', d.color);\n      el.style.setProperty('--hd', tint(d.color));\n      let hidden = 0;\n      const rowsHtml = t.cols.map(c => {\n        const flags = c[2] || '';\n        const isPk = /\\bP\\b/.test(flags);\n        const fk = flags.split(/\\s+/).find(f=>f.startsWith('F:'));\n        const isFk = !!fk;\n        const isU = /\\bU\\b/.test(flags);\n        const keep = isPk || isFk || isU || /\\bK\\b/.test(flags);\n        if (!keep) hidden++;\n        const cls = ['row', isPk?'pk':'', isFk?'fk':'', isU?'uq':'', keep?'keep':''].join(' ').trim();\n        const keyMark = isPk ? 'PK' : (isFk ? 'FK' : '');\n        const badges = (isU?'<span class=\"badge u\">UQ<\u002Fspan>':'') + (c[1]==='enc'?'<span class=\"badge enc\">ENC<\u002Fspan>':'');\n        return `<div class=\"${cls}\"><span class=\"key\">${keyMark}<\u002Fspan><span class=\"cn\">${c[0]}<\u002Fspan>${badges}<span class=\"ty\">${c[1]}<\u002Fspan><\u002Fdiv>`;\n      }).join('');\n      el.innerHTML = `<div class=\"hd\"><span class=\"dot\"><\u002Fspan><span class=\"nm\">${t.name}<\u002Fspan><span class=\"cnt\">${t.cols.length}<\u002Fspan><\u002Fdiv>${rowsHtml}<div class=\"more\">+${hidden} more columns<\u002Fdiv>`;\n      el._hidden = hidden;\n      vp.appendChild(el);\n      elFor[t.name] = el;\n      el.addEventListener('mouseenter', () => focusTable(t.name));\n      el.addEventListener('mouseleave', clearFocus);\n    });\n\n    function tint(hex){\n      const n = parseInt(hex.slice(1),16), r=n>>16,g=(n>>8)&255,b=n&255, a=0.07;\n      return `rgba(${r},${g},${b},${a})`;\n    }\n\n    // ----- compute row Y within a table (canvas coords) -----\n    function rowCenterY(tname, colIdx){\n      const t = byName[tname];\n      const ty = (t._y!=null) ? t._y : t.y;\n      const compact = vp.classList.contains('compact');\n      let visIdx = 0, target = -1;\n      for (let i=0;i<t.cols.length;i++){\n        const flags = t.cols[i][2]||'';\n        const keep = /\\bP\\b/.test(flags) || flags.includes('F:') || /\\bU\\b/.test(flags) || /\\bK\\b/.test(flags);\n        const shown = !compact || keep;\n        if (i===colIdx){ target = shown ? visIdx : -1; break; }\n        if (shown) visIdx++;\n      }\n      if (target === -1){ // hidden row -> point at header area\n        return ty + HEADER_H/2;\n      }\n      return ty + HEADER_H + target*ROW_H + ROW_H/2;\n    }\n    // ----- auto-relax: remove vertical overlaps per column for the active mode -----\n    function relax(){\n      const GAP = 46;\n      const cols = {};\n      TABLES.forEach(t => { const k = Math.round(t.x/70); (cols[k]=cols[k]||[]).push(t); });\n      Object.values(cols).forEach(group => {\n        group.sort((a,b)=>a.y-b.y);\n        let floor = -1e9;\n        group.forEach(t => {\n          const y = Math.max(t.y, floor);\n          t._x = t.x; t._y = y;\n          floor = y + tableHeight(t.name) + GAP;\n        });\n      });\n      TABLES.forEach(t => { const e=elFor[t.name]; e.style.left=t._x+'px'; e.style.top=t._y+'px'; });\n    }\n    function tableHeight(tname){\n      const t = byName[tname];\n      const compact = vp.classList.contains('compact');\n      let n = 0;\n      t.cols.forEach(c=>{ const f=c[2]||''; const keep=/\\bP\\b/.test(f)||f.includes('F:')||/\\bU\\b/.test(f)||/\\bK\\b/.test(f);\n        if(!compact||keep) n++; });\n      let h = HEADER_H + n*ROW_H;\n      if (compact && elFor[tname]._hidden>0) h += 22;\n      return h;\n    }\n    const TW = 232;\n\n    // ----- draw wires -----\n    function draw(){\n      relax();\n      while (svg.firstChild) svg.removeChild(svg.firstChild);\n      let maxX=0, maxY=0;\n      TABLES.forEach(t=>{ maxX=Math.max(maxX,t._x+TW); maxY=Math.max(maxY,t._y+tableHeight(t.name)); });\n      const W = maxX+120, H = maxY+120;\n      svg.setAttribute('width', W); svg.setAttribute('height', H);\n      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);\n      vp.style.width = W+'px'; vp.style.height = H+'px';\n\n      rels.forEach((r, idx) => {\n        const A = byName[r.from], B = byName[r.to];\n        const pY = rowCenterY(r.from, 0);            // parent PK row (id)\n        const cY = rowCenterY(r.to, r.colIdx);       // child FK row\n        const aCx = A._x + TW/2, bCx = B._x + TW/2;\n        let aSide, bSide, ax, bx;\n        if (bCx >= aCx){ aSide=1; bSide=-1; ax=A._x+TW; bx=B._x; }\n        else { aSide=-1; bSide=1; ax=A._x; bx=B._x+TW; }\n        const dx = Math.max(40, Math.abs(bx-ax)*0.4);\n        const c1x = ax + aSide*dx, c2x = bx + bSide*dx;\n        const path = document.createElementNS(NS,'path');\n        path.setAttribute('d', `M ${ax} ${pY} C ${c1x} ${pY}, ${c2x} ${cY}, ${bx} ${cY}`);\n        path.setAttribute('class','wire'+(r.oneToOne?' one-one':''));\n        path.dataset.from=r.from; path.dataset.to=r.to;\n        svg.appendChild(path);\n\n        // markers\n        const one = mkMarker(ax, pY, aSide, 'one');\n        one.dataset.from=r.from; one.dataset.to=r.to; svg.appendChild(one);\n        const many = mkMarker(bx, cY, bSide, r.oneToOne?'one':'many');\n        many.dataset.from=r.from; many.dataset.to=r.to; svg.appendChild(many);\n      });\n      applyDomainFilter();\n    }\n\n    // crow's-foot / bar markers. dir: +1 means line goes to the right of point\n    function mkMarker(x, y, side, kind){\n      const g = document.createElementNS(NS,'path');\n      g.setAttribute('class','marker');\n      const s = side; // -1 line leaves to left, +1 to right\n      const off = 12*s, bar = 9*s;\n      let d='';\n      if (kind==='one'){\n        // single perpendicular bar near the box\n        d = `M ${x+bar} ${y-5} L ${x+bar} ${y+5}`;\n      } else {\n        // crow's foot: three prongs spreading toward the box\n        d = `M ${x+off} ${y-6} L ${x} ${y} L ${x+off} ${y+6} M ${x+off} ${y} L ${x} ${y}`;\n      }\n      g.setAttribute('d', d);\n      return g;\n    }\n\n    // ----- focus -----\n    let pinned = null;\n    function focusTable(name){\n      vp.classList.add('focusing'); svg.classList.add('focusing');\n      const lit = adj[name];\n      TABLES.forEach(t=>{\n        const e = elFor[t.name];\n        e.classList.toggle('lit', lit.has(t.name));\n        e.classList.toggle('root', t.name===name);\n      });\n      svg.querySelectorAll('.wire,.marker').forEach(w=>{\n        const on = w.dataset.from===name || w.dataset.to===name;\n        w.classList.toggle('lit', on);\n      });\n    }\n    function clearFocus(){\n      if (pinned) return;\n      vp.classList.remove('focusing'); svg.classList.remove('focusing');\n      TABLES.forEach(t=>{ elFor[t.name].classList.remove('lit','root'); });\n      svg.querySelectorAll('.wire,.marker').forEach(w=>w.classList.remove('lit'));\n    }\n    // click to pin\n    Object.values(elFor).forEach(el=>{\n      el.addEventListener('click', (e)=>{ e.stopPropagation();\n        const n = el.dataset.name;\n        if (pinned===n){ pinned=null; clearFocus(); }\n        else { pinned=n; focusTable(n); }\n      });\n    });\n    stage.addEventListener('click', ()=>{ if(pinned){ pinned=null; clearFocus(); } });\n\n    // ----- domain filter -----\n    function applyDomainFilter(){\n      TABLES.forEach(t=>{\n        const on = activeDomains.has(t.domain);\n        elFor[t.name].classList.toggle('dimmed', !on);\n      });\n      svg.querySelectorAll('.wire,.marker').forEach(w=>{\n        const on = activeDomains.has(byName[w.dataset.from].domain) && activeDomains.has(byName[w.dataset.to].domain);\n        w.classList.toggle('dimmed', !on);\n      });\n    }\n\n    // ----- search -----\n    const search = document.getElementById('search');\n    search.addEventListener('input', ()=>{\n      const q = search.value.trim().toLowerCase();\n      if (!q){ TABLES.forEach(t=>elFor[t.name].classList.remove('dimmed')); applyDomainFilter(); return; }\n      TABLES.forEach(t=>{\n        const hit = t.name.toLowerCase().includes(q) || t.cols.some(c=>c[0].toLowerCase().includes(q));\n        elFor[t.name].classList.toggle('dimmed', !hit);\n      });\n    });\n\n    // ----- density -----\n    document.getElementById('density').addEventListener('click', e=>{\n      const b = e.target.closest('button'); if(!b) return;\n      document.querySelectorAll('#density button').forEach(x=>x.classList.remove('on'));\n      b.classList.add('on');\n      vp.classList.toggle('compact', b.dataset.d==='compact');\n      draw();\n    });\n\n    // ----- pan & zoom -----\n    let scale=1, tx=40, ty=24;\n    function apply(){ vp.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;\n      document.getElementById('zlabel').textContent = Math.round(scale*100)+'%'; }\n    let panning=false, sx, sy, stx, sty;\n    stage.addEventListener('mousedown', e=>{ if(e.button!==0) return;\n      panning=true; stage.classList.add('grabbing'); sx=e.clientX; sy=e.clientY; stx=tx; sty=ty; });\n    window.addEventListener('mousemove', e=>{ if(!panning) return;\n      tx=stx+(e.clientX-sx); ty=sty+(e.clientY-sy); apply(); });\n    window.addEventListener('mouseup', ()=>{ panning=false; stage.classList.remove('grabbing'); });\n    stage.addEventListener('wheel', e=>{ e.preventDefault();\n      const r = stage.getBoundingClientRect();\n      const mx=e.clientX-r.left, my=e.clientY-r.top;\n      const k = Math.exp(-e.deltaY*0.0014);\n      const ns = Math.min(2.2, Math.max(0.12, scale*k));\n      tx = mx-(mx-tx)*(ns/scale); ty = my-(my-ty)*(ns/scale);\n      scale=ns; apply();\n    }, {passive:false});\n    document.getElementById('zin').onclick=()=>zoomBtn(1.2);\n    document.getElementById('zout').onclick=()=>zoomBtn(1/1.2);\n    function zoomBtn(k){ const r=stage.getBoundingClientRect(); const mx=r.width/2,my=r.height/2;\n      const ns=Math.min(2.2,Math.max(0.12,scale*k)); tx=mx-(mx-tx)*(ns/scale); ty=my-(my-ty)*(ns/scale); scale=ns; apply(); }\n\n    function fit(){\n      const W=parseFloat(vp.style.width), H=parseFloat(vp.style.height);\n      const r=stage.getBoundingClientRect();\n      const m=60;\n      scale=Math.min((r.width-m*2)/W,(r.height-m*2)/H, 1);\n      tx=(r.width-W*scale)/2; ty=(r.height-H*scale)/2; apply();\n    }\n    document.getElementById('fitBtn').onclick=fit;\n    document.getElementById('resetBtn').onclick=()=>{ scale=1; tx=40; ty=24; apply(); };\n\n    draw(); apply();\n    requestAnimationFrame(fit);\n    window.addEventListener('resize', ()=>{});\n  })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
